workflows:
  android-apk:
    name: MS Lawyer OS - Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - keystore_credentials
    scripts:
      - name: Unzip project (if uploaded as a single zip file)
        script: |
          rm -rf ms_lawyer_os
          if [ -f "ms_lawyer_os.zip" ]; then
            unzip -o ms_lawyer_os.zip
          fi
          find ms_lawyer_os -exec touch {} + 2>/dev/null || true
      - name: Add Hearings module files
        script: |
          cd ms_lawyer_os
          mkdir -p lib/presentation/screens/hearings
          mkdir -p lib/data/repositories lib/data/models lib/domain/entities lib/presentation/widgets
