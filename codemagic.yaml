                  );
                }
              } finally {
                if (mounted) setState(() => _saving = false);
              }
            }
          
            String _fmtDate(DateTime d) => '${d.year}/${d.month.toString().padLeft(2, '0')}/${d.day.toString().padLeft(2, '0')}';
          
