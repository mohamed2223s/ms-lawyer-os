          sed -i.bak "s/com.android.tools.build:gradle:8.3.0/com.android.tools.build:gradle:8.11.0/" android/build.gradle
          sed -i.bak "s/kotlin_version = '1.9.22'/kotlin_version = '2.1.0'/" android/build.gradle
          rm -f android/build.gradle.bak
          sed -i.bak 's/id "com.android.application" version "8.3.0" apply false/id "com.android.application" version "8.11.0" apply false/' android/settings.gradle
          sed -i.bak 's/id "org.jetbrains.kotlin.android" version "1.9.22" apply false/id "org.jetbrains.kotlin.android" version "2.1.0" apply false/' android/settings.gradle
          rm -f android/settings.gradle.bak
      - name: Fix compileSdk and targetSdk
        script: |
          cd ms_lawyer_os
          sed -i.bak "s/compileSdk 34/compileSdk 36/" android/app/build.gradle
          sed -i.bak "s/targetSdkVersion 34/targetSdkVersion 36/" android/app/build.gradle
          rm -f android/app/build.gradle.bak
      - name: Fix known Dart import path bugs
        script: |
          cd ms_lawyer_os
          sed -i.bak "s#import '../../core/constants/app_colors.dart';#import '../../../core/constants/app_colors.dart';#" lib/presentation/screens/splash/splash_screen.dart
          rm -f lib/presentation/screens/splash/splash_screen.dart.bak
          sed -i.bak "s#'../../../core/constants/app_colors.dart'#'../../core/constants/app_colors.dart'#" lib/presentation/widgets/client_picker_sheet.dart
          sed -i.bak "s#'../../../data/repositories/client_repository.dart'#'../../data/repositories/client_repository.dart'#" lib/presentation/widgets/client_picker_sheet.dart
          sed -i.bak "s#'../../../domain/entities/client.dart'#'../../domain/entities/client.dart'#" lib/presentation/widgets/client_picker_sheet.dart
          rm -f lib/presentation/widgets/client_picker_sheet.dart.bak
      - name: Fix manifest merger conflict with camera plugin
        script: |
          cd ms_lawyer_os
          sed -i.bak 's#<manifest xmlns:android="http://schemas.android.com/apk/res/android">#<manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools">#' android/app/src/main/AndroidManifest.xml
          sed -i.bak 's#<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="32" />#<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="32" tools:replace="android:maxSdkVersion" />#' android/app/src/main/AndroidManifest.xml
          sed -i.bak 's#<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />#<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" tools:replace="android:maxSdkVersion" />#' android/app/src/main/AndroidManifest.xml
          rm -f android/app/src/main/AndroidManifest.xml.bak
      - name: Add missing launcher icon
        script: |
          cd ms_lawyer_os
          mkdir -p android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi
          echo "" | base64 -d > /tmp/ic_launcher.png
          cp /tmp/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp /tmp/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp /tmp/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp /tmp/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp /tmp/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      - name: Disable code minification to avoid R8 missing-class errors
        script: |
          cd ms_lawyer_os
          sed -i.bak "s/minifyEnabled true/minifyEnabled false/" android/app/build.gradle
          sed -i.bak "s/shrinkResources true/shrinkResources false/" android/app/build.gradle
          rm -f android/app/build.gradle.bak
      - name: Set up release signing keystore
        script: |
          cd ms_lawyer_os
          echo $CM_KEYSTORE | base64 -d > android/mslawyeros-release.jks
          cat > android/key.properties << KEYEOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=mslawyeros-release.jks
          KEYEOF
      - name: Get Flutter packages
        script: |
          cd ms_lawyer_os
          flutter pub get
      - name: Build release APK
        script: |
          cd ms_lawyer_os
          flutter clean
          flutter build apk --release
