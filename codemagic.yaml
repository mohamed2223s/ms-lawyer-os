          import 'package:equatable/equatable.dart';

          /// سجل تأجيل جلسة - يحفظ التاريخ السابق وسبب التأجيل، لبناء تسلسل الجلسات كاملاً
          class HearingPostponement extends Equatable {
            final String id;
            final DateTime previousDate;
            final String reason;
            final DateTime postponedAt;

            const HearingPostponement({
              required this.id,
              required this.previousDate,
              required this.reason,
              required this.postponedAt,
            });

            Map<String, dynamic> toMap() => {
                  'id': id,
                  'previousDate': previousDate.toIso8601String(),
                  'reason': reason,
                  'postponedAt': postponedAt.toIso8601String(),
                };

            factory HearingPostponement.fromMap(Map map) => HearingPostponement(
                  id: map['id'] as String,
                  previousDate: DateTime.parse(map['previousDate'] as String),
                  reason: map['reason'] as String? ?? '',
                  postponedAt: DateTime.parse(map['postponedAt'] as String),
                );

            @override
            List<Object?> get props => [id, previousDate, reason, postponedAt];
          }

          /// كيان الجلسة - يمثل جلسة محكمة مرتبطة (اختياريًا) بقضية
          class Hearing extends Equatable {
            final String id;
            final String officeId;
            final String? caseId;
            final String caseTitle;
            final String clientName;
            final String court;
            final String location;
            final DateTime date;
            final String notes;
            final String result;
            final String requiredActions;
            final List<HearingPostponement> postponements;
            final DateTime createdAt;
            final DateTime updatedAt;
            final bool isSynced;
            final bool isDeleted;

            const Hearing({
              required this.id,
              required this.officeId,
              this.caseId,
              required this.caseTitle,
              required this.clientName,
              required this.court,
              required this.location,
              required this.date,
              this.notes = '',
              this.result = '',
              this.requiredActions = '',
              this.postponements = const [],
              required this.createdAt,
              required this.updatedAt,
              this.isSynced = false,
              this.isDeleted = false,
            });

            /// رقم الجلسة الحالية في التسلسل (١ يعني الجلسة الأولى، وهكذا)
            int get sequenceNumber => postponements.length + 1;

            Hearing copyWith({
              String? caseId,
              String? caseTitle,
              String? clientName,
              String? court,
              String? location,
              DateTime? date,
              String? notes,
              String? result,
              String? requiredActions,
              List<HearingPostponement>? postponements,
              DateTime? updatedAt,
              bool? isSynced,
              bool? isDeleted,
            }) {
              return Hearing(
                id: id,
                officeId: officeId,
                caseId: caseId ?? this.caseId,
                caseTitle: caseTitle ?? this.caseTitle,
                clientName: clientName ?? this.clientName,
                court: court ?? this.court,
                location: location ?? this.location,
                date: date ?? this.date,
                notes: notes ?? this.notes,
                result: result ?? this.result,
                requiredActions: requiredActions ?? this.requiredActions,
                postponements: postponements ?? this.postponements,
                createdAt: createdAt,
                updatedAt: updatedAt ?? DateTime.now(),
                isSynced: isSynced ?? this.isSynced,
                isDeleted: isDeleted ?? this.isDeleted,
              );
            }

            @override
            List<Object?> get props => [
                  id,
                  officeId,
                  caseId,
                  caseTitle,
                  clientName,
                  court,
                  location,
                  date,
                  notes,
                  result,
                  requiredActions,
                  postponements,
                  createdAt,
                  updatedAt,
                  isSynced,
                  isDeleted,
                ];
          }

