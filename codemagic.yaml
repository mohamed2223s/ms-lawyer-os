          cat > lib/data/repositories/hearing_repository.dart << 'DARTEOF2'
          import 'dart:async';
          import 'package:cloud_firestore/cloud_firestore.dart';
          import 'package:uuid/uuid.dart';
          import '../../core/constants/firestore_paths.dart';
          import '../../core/services/connectivity_service.dart';
          import '../../core/services/notification_service.dart';
          import '../../core/services/sync_queue_service.dart';
          import '../../domain/entities/hearing.dart';
          import '../models/hearing_model.dart';
          
          class HearingRepository {
            HearingRepository({required this.officeId});
          
            final String officeId;
            final _uuid = const Uuid();
            final _firestore = FirebaseFirestore.instance;
          
            /// يُستدعى تلقائيًا بعد أي إضافة/تعديل/تأجيل/حذف لجلسة مرتبطة بقضية،
            /// عشان القضية تحدّث خانة "الجلسة القادمة" بتاعتها فورًا
            Future<void> Function(String caseId)? onHearingChangedForCase;
          
            StreamSubscription<QuerySnapshot<Map<String, dynamic>>>? _remoteSub;
          
            CollectionReference<Map<String, dynamic>> get _collection =>
                _firestore.collection(FirestorePaths.hearingsCol(officeId));
          
            void startRemoteSync() {
              _remoteSub?.cancel();
              _remoteSub = _collection.snapshots().listen((snapshot) {
                for (final change in snapshot.docChanges) {
                  _mergeIntoLocal(HearingModel.fromFirestore(change.doc));
                }
              }, onError: (_) {});
            }
          
            void stopRemoteSync() {
              _remoteSub?.cancel();
              _remoteSub = null;
            }
          
            void _mergeIntoLocal(HearingModel remote) {
              final box = HearingHiveBox.box;
              final localRaw = box.get(remote.id);
              if (localRaw != null) {
                final local = HearingModel.fromHiveMap(localRaw as Map);
                if (!local.isSynced && local.updatedAt.isAfter(remote.updatedAt)) return;
              }
              box.put(remote.id, remote.copyWith(isSynced: true).toHiveMap());
            }
          
            List<Hearing> getAllLocal() {
              final box = HearingHiveBox.box;
              return box.values
                  .map((raw) => HearingModel.fromHiveMap(raw as Map))
                  .where((m) => !m.isDeleted)
                  .map((m) => m.toEntity())
                  .toList()
                ..sort((a, b) => a.date.compareTo(b.date));
            }
          
            List<Hearing> getHearingsForCase(String caseId) =>
                getAllLocal().where((h) => h.caseId == caseId).toList();
          
            Stream<List<Hearing>> watchAll() async* {
              yield getAllLocal();
              yield* HearingHiveBox.box.watch().asyncMap((_) => getAllLocal());
            }
          
            List<Hearing> getForDay(DateTime day) {
              return getAllLocal()
                  .where((h) => h.date.year == day.year && h.date.month == day.month && h.date.day == day.day)
                  .toList();
            }
          
            Map<DateTime, List<Hearing>> getGroupedByDay() {
              final map = <DateTime, List<Hearing>>{};
              for (final h in getAllLocal()) {
                final key = DateTime(h.date.year, h.date.month, h.date.day);
                map.putIfAbsent(key, () => []).add(h);
              }
              return map;
            }
          
            List<Hearing> getUpcoming({int limit = 5}) {
              final now = DateTime.now();
              final today = DateTime(now.year, now.month, now.day);
              return getAllLocal().where((h) => !h.date.isBefore(today)).take(limit).toList();
            }
          
            Future<Hearing> addHearing({
              String? caseId,
              required String caseTitle,
              required String clientName,
              required String court,
              required String location,
              required DateTime date,
              String notes = '',
            }) async {
              final now = DateTime.now();
              final entity = Hearing(
                id: _uuid.v4(),
                officeId: officeId,
                caseId: caseId,
                caseTitle: caseTitle,
                clientName: clientName,
                court: court,
                location: location,
                date: date,
                notes: notes,
                createdAt: now,
                updatedAt: now,
                isSynced: false,
              );
              await _persist(entity);
              return entity;
            }
          
            Future<void> _persist(Hearing entity) async {
              final model = HearingModel.fromEntity(entity);
              await HearingHiveBox.box.put(model.id, model.toHiveMap());
              await SyncQueueService.instance.enqueue(
                collectionPath: FirestorePaths.hearingsCol(officeId),
                docId: model.id,
                operation: SyncOperation.update,
                payload: model.toFirestore(),
              );
              try {
                await NotificationService.instance.scheduleHearingReminders(
                  hearingId: entity.id,
                  hearingDate: entity.date,
                  title: 'تذكير بجلسة قادمة',
                  body: '${entity.caseTitle} - ${entity.clientName} - ${entity.court}',
                );
              } catch (_) {
                // أي خطأ في جدولة التنبيه لا يجب أن يمنع حفظ الجلسة نفسها
              }
              if (entity.caseId != null) {
                try {
                  await onHearingChangedForCase?.call(entity.caseId!);
                } catch (_) {
                  // فشل تحديث القضية لا يجب أن يمنع حفظ الجلسة نفسها
                }
              }
            }
          
            Future<Hearing> updateHearing(Hearing entity) async {
              final updated = entity.copyWith(updatedAt: DateTime.now(), isSynced: false);
              await _persist(updated);
              return updated;
            }
          
            /// يحدّث اسم العميل و/أو عنوان القضية في كل الجلسات (القديمة والمستقبلية)
            /// المرتبطة بقضية معينة، بدون أي تغيير في تاريخها أو بياناتها التانية
            Future<void> renameForCase(String caseId, {String? caseTitle, String? clientName}) async {
              final box = HearingHiveBox.box;
              for (final raw in box.values.toList()) {
                final model = HearingModel.fromHiveMap(raw as Map);
                if (model.isDeleted || model.caseId != caseId) continue;
                final needsCaseTitle = caseTitle != null && model.caseTitle != caseTitle;
                final needsClientName = clientName != null && model.clientName != clientName;
                if (!needsCaseTitle && !needsClientName) continue;
                final entity = model.toEntity().copyWith(
                      caseTitle: caseTitle ?? model.caseTitle,
                      clientName: clientName ?? model.clientName,
                      updatedAt: DateTime.now(),
                      isSynced: false,
                    );
                await _persist(entity);
              }
            }
          
            /// تأجيل الجلسة: الجلسة القديمة تفضل ثابتة في تاريخها الأصلي، وتُسجَّل فيها
            /// نتيجة التأجيل تلقائيًا. جلسة جديدة تمامًا بيتعملها بالتاريخ الجديد، وترث
            /// سجل التأجيلات السابق كامل عشان رقمها التسلسلي يبقى صحيح.
            Future<Hearing> postponeHearing(Hearing hearing, DateTime newDate, String reason) async {
              final effectiveReason = reason.trim().isEmpty ? 'غير محدد' : reason.trim();
              String fmt(DateTime d) => '${d.year}/${d.month.toString().padLeft(2, '0')}/${d.day.toString().padLeft(2, '0')}';
          
              final record = HearingPostponement(
                id: _uuid.v4(),
                previousDate: hearing.date,
                reason: effectiveReason,
                postponedAt: DateTime.now(),
              );
          
              // 1) جلسة جديدة منفصلة تمامًا بالتاريخ الجديد - نحفظها أولاً لضمان تسجيلها
              final now = DateTime.now();
              final newHearing = Hearing(
                id: _uuid.v4(),
                officeId: officeId,
                caseId: hearing.caseId,
                caseTitle: hearing.caseTitle,
                clientName: hearing.clientName,
                court: hearing.court,
                location: hearing.location,
                date: newDate,
                postponements: [...hearing.postponements, record],
                createdAt: now,
                updatedAt: now,
                isSynced: false,
              );
              await _persist(newHearing);
          
              // 2) الجلسة القديمة: تسجيل قرار التأجيل في خانة النتيجة بدون تغيير تاريخها
              final closedOld = hearing.copyWith(
                result: 'تأجلت لجلسة ${fmt(newDate)} لسبب $effectiveReason',
                updatedAt: DateTime.now(),
                isSynced: false,
              );
              await _persist(closedOld);
          
              return newHearing;
            }
          
            Future<void> deleteHearing(String id) async {
              final raw = HearingHiveBox.box.get(id);
              if (raw == null) return;
              final model = HearingModel.fromHiveMap(raw as Map).copyWith(isDeleted: true, updatedAt: DateTime.now(), isSynced: false);
              await HearingHiveBox.box.put(id, model.toHiveMap());
              await SyncQueueService.instance.enqueue(
                collectionPath: FirestorePaths.hearingsCol(officeId),
                docId: id,
                operation: SyncOperation.delete,
                payload: {'isDeleted': true, 'updatedAt': Timestamp.now()},
              );
              await NotificationService.instance.cancelHearingReminders(id);
              if (model.caseId != null) {
                try {
                  await onHearingChangedForCase?.call(model.caseId!);
                } catch (_) {
                  // فشل تحديث القضية لا يجب أن يمنع حذف الجلسة نفسها
                }
              }
            }
          
            Future<bool> isOnline() => ConnectivityService.instance.isOnline();
          }
