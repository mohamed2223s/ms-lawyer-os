workflows:
  android-apk:
    name: MS Lawyer OS - Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Unzip project (if uploaded as a single zip file)
        script: |
          if [ -f "ms_lawyer_os.zip" ]; then
            unzip -o ms_lawyer_os.zip
          fi
      - name: Fix intl version constraint
        script: |
          cd ms_lawyer_os
          sed -i.bak "s/intl: \^0.19.0/intl: ^0.20.2/" pubspec.yaml
          rm -f pubspec.yaml.bak
      - name: Remove incompatible workmanager dependency
        script: |
          cd ms_lawyer_os
          sed -i.bak "/workmanager: \^0.5.2/d" pubspec.yaml
          rm -f pubspec.yaml.bak
      - name: Fix Gradle wrapper, AGP and Kotlin version
        script: |
          cd ms_lawyer_os
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'GRADLEEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.14.2-all.zip
          GRADLEEOF
          sed -i.bak "s/com.android.tools.build:gradle:8.3.0/com.android.tools.build:gradle:8.11.0/" android/build.gradle
          sed -i.bak "s/kotlin_version = '1.9.22'/kotlin_version = '2.1.0'/" android/build.gradle
          rm -f android/build.gradle.bak
          sed -i.bak 's/id "com.android.application" version "8.3.0" apply false/id "com.android.application" version "8.11.0" apply false/' android/settings.gradle
          sed -i.bak 's/id "org.jetbrains.kotlin.android" version "1.9.22" apply false/id "org.jetbrains.kotlin.android" version "2.1.0" apply false/' android/settings.gradle
          rm -f android/settings.gradle.bak
      - name: Fix compileSdk and targetSdk
        script: |
          cd ms_lawyer_os
          sed -i.bak "s/compileSdk 34/compileSdk 36/" android/app/build.gradle
          sed -i.bak "s/targetSdkVersion 34/targetSdkVersion 36/" android/app/build.gradle
          rm -f android/app/build.gradle.bak
      - name: Fix splash_screen import path bug
        script: |
          cd ms_lawyer_os
          sed -i.bak "s#import '../../core/constants/app_colors.dart';#import '../../../core/constants/app_colors.dart';#" lib/presentation/screens/splash/splash_screen.dart
          rm -f lib/presentation/screens/splash/splash_screen.dart.bak
      - name: Get Flutter packages
        script: |
          cd ms_lawyer_os
          flutter pub get
      - name: Build release APK
        script: |
          cd ms_lawyer_os
          flutter build apk --release
    artifacts:
      - ms_lawyer_os/build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
